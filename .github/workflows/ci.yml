name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest-cov

      - name: Lint (ruff)
        run: ruff check app

      - name: Migrate-check (schema matches models)
        run: |
          alembic upgrade head
          # autogenerate must produce an empty migration: models == migrations.
          alembic revision --autogenerate -m _check
          python - <<'PY'
          import glob, sys
          latest = max(glob.glob("alembic/versions/*_check.py"))
          body = open(latest, encoding="utf-8").read()
          # A no-op migration has `pass` in both upgrade and downgrade.
          ops = body.split("def upgrade")[1]
          if "op." in ops.split("def downgrade")[0]:
              print("Schema drift: models and migrations differ. Generate a migration.")
              sys.exit(1)
          print("No schema drift.")
          PY

      - name: Tests (with coverage gate)
        run: pytest -q --cov=app --cov-report=term-missing --cov-fail-under=80

  # Prove the Postgres path (production's engine) works: apply migrations on a
  # real Postgres 16, then run a focused smoke test (readiness + a CRUD
  # round-trip). The main suite above is bound to in-memory SQLite via
  # conftest, so this job deliberately runs ONLY tests/test_pg_smoke.py rather
  # than claiming Postgres coverage it doesn't have.
  migrate-smoke-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scm
          POSTGRES_PASSWORD: scm
          POSTGRES_DB: scm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://scm:scm@localhost:5432/scm
      SECRET_KEY: ci-postgres-secret-key-0000000000000000
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "psycopg[binary]>=3.1"

      - name: Migrate (Postgres) — proves migrations apply cleanly on Postgres
        run: alembic upgrade head

      - name: Postgres smoke test (readiness + CRUD round-trip)
        run: pytest -q tests/test_pg_smoke.py

  # Agent safety evaluation — drive the REAL deterministic placement/sourcing
  # gate with ONLY the Claude call stubbed (app.agent.copilot.call_claude). It
  # feeds reasonable AND hostile LLM advice and asserts the deterministic layer
  # holds the line ("LLM advises, deterministic code decides").
  #
  # NO ANTHROPIC_API_KEY is needed or set: the LLM seam is monkeypatched, so this
  # job runs fully offline and at zero API cost. --md-report prints a presentable
  # scenario/category/invariant/pass-fail table to the job log.
  agent-eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Agent safety evaluation (no API key — LLM seam is stubbed)
        run: pytest -m agent_eval --md-report

  # Security SAST — scan the app only (NOT tests; fixtures legitimately contain
  # literals). Demo seed creds + the insecure-default sentinel are annotated
  # `# nosec` with rationale, so this is clean. Fails the build on any finding.
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit

      - name: Bandit (app only)
        run: bandit -r backend/app

  # Dependency CVE audit — audits the declared project deps, NOT the CI
  # toolchain's own pip (which avoids unrelated pip-self advisories). Fails on a
  # vulnerable dependency.
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (declared project dependencies)
        run: pip-audit -r backend/requirements.txt
