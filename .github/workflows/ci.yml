name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app

      - name: Migrate-check (schema matches models)
        run: |
          alembic upgrade head
          # autogenerate must produce an empty migration: models == migrations.
          alembic revision --autogenerate -m _check
          python - <<'PY'
          import glob, sys
          latest = max(glob.glob("alembic/versions/*_check.py"))
          body = open(latest, encoding="utf-8").read()
          # A no-op migration has `pass` in both upgrade and downgrade.
          ops = body.split("def upgrade")[1]
          if "op." in ops.split("def downgrade")[0]:
              print("Schema drift: models and migrations differ. Generate a migration.")
              sys.exit(1)
          print("No schema drift.")
          PY

      - name: Tests
        run: pytest -q

  # Catch SQLite/Postgres dialect drift: run migrations + the suite against a
  # real Postgres service (same engine as production).
  test-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scm
          POSTGRES_PASSWORD: scm
          POSTGRES_DB: scm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scm"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://scm:scm@localhost:5432/scm
      SECRET_KEY: ci-postgres-secret-key-0000000000000000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "psycopg[binary]>=3.1"

      - name: Migrate (Postgres)
        run: alembic upgrade head

      - name: Tests (Postgres)
        run: pytest -q
