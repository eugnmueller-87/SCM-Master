name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app

      - name: Migrate-check (schema matches models)
        run: |
          alembic upgrade head
          # autogenerate must produce an empty migration: models == migrations.
          alembic revision --autogenerate -m _check
          python - <<'PY'
          import glob, sys
          latest = max(glob.glob("alembic/versions/*_check.py"))
          body = open(latest, encoding="utf-8").read()
          # A no-op migration has `pass` in both upgrade and downgrade.
          ops = body.split("def upgrade")[1]
          if "op." in ops.split("def downgrade")[0]:
              print("Schema drift: models and migrations differ. Generate a migration.")
              sys.exit(1)
          print("No schema drift.")
          PY

      - name: Tests
        run: pytest -q
